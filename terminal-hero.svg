<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" width="820" height="430" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="typeclip">
      <rect x="56" y="368" width="0" height="26">
        <animate attributeName="width" values="0;0;172;172;0" keyTimes="0;0.08;0.55;0.9;1" dur="4.5s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- window -->
  <rect x="12" y="12" width="796" height="406" rx="12" fill="url(#bg)" stroke="#2ea043" stroke-width="1.5"/>

  <!-- title bar -->
  <circle cx="40" cy="33" r="6.5" fill="#ff5f56"/>
  <circle cx="63" cy="33" r="6.5" fill="#ffbd2e"/>
  <circle cx="86" cy="33" r="6.5" fill="#27c93f"/>
  <text x="410" y="38" text-anchor="middle" font-size="13" fill="#8b949e">vibek@portfolio: ~</text>
  <line x1="12" y1="54" x2="808" y2="54" stroke="#21262d" stroke-width="1"/>

  <!-- body -->
  <text x="32" y="96" font-size="17"><tspan fill="#39d353">$</tspan><tspan fill="#c9d1d9"> whoami</tspan></text>

  <text x="56" y="146" font-size="34" font-weight="bold" fill="#e6edf3" filter="url(#glow)">&gt; Vibek Dutta</text>
  <line x1="58" y1="158" x2="360" y2="158" stroke="#39d353" stroke-width="2" filter="url(#glow)"/>

  <text x="32" y="202" font-size="17"><tspan fill="#39d353">$</tspan><tspan fill="#c9d1d9"> cat role.txt</tspan></text>
  <text x="56" y="234" font-size="18" fill="#39d353" filter="url(#glow)">&gt; Solutions Architect | Fullstack Developer</text>

  <text x="32" y="278" font-size="17"><tspan fill="#39d353">$</tspan><tspan fill="#c9d1d9"> cat about.md</tspan></text>
  <text x="56" y="306" font-size="14" fill="#6e7681"># Root user with 4+ years of uptime. Specializing in</text>
  <text x="56" y="328" font-size="14" fill="#6e7681"># architecting scalable distributed systems &amp; cloud infra.</text>
  <text x="56" y="350" font-size="14" fill="#6e7681"># Building in the open — blogs, OSS, and side quests.</text>

  <!-- prompt line with typing + blinking cursor -->
  <text x="32" y="387" font-size="17" fill="#39d353">$</text>
  <g clip-path="url(#typeclip)">
    <text x="56" y="387" font-size="17" fill="#c9d1d9">./contact_me.sh</text>
  </g>
  <rect y="370" width="10" height="22" fill="#39d353">
    <animate attributeName="x" values="56;56;220;220;56" keyTimes="0;0.08;0.55;0.9;1" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0;0;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>
</svg>
